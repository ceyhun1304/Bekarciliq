<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çay içək? 🍵</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #eef7ec;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    position: relative;
  }

  .card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.93);
    border-radius: 36px;
    padding: 48px 52px 44px;
    text-align: center;
    box-shadow: 0 12px 48px rgba(100,180,100,0.15);
    width: min(420px, 90vw);
    border: 2px solid rgba(160,220,140,0.35);
  }

  .char {
    width: 200px;
    height: 200px;
    object-fit: contain;
    display: block;
    margin: 0 auto 16px;
  }

  @keyframes charBounce {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50%       { transform: translateY(-8px) rotate(3deg); }
  }

  h1 {
    font-size: 32px;
    font-weight: 900;
    color: #3a7d44;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 18px;
    color: #9ab89a;
    margin-bottom: 36px;
    font-weight: 400;
    min-height: 20px;
  }

  .btn-wrap {
    position: relative;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn {
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    color: white;
    transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }

  #yes-btn {
    background: #5cb85c;
    font-size: 18px;
    padding: 16px 36px;
    box-shadow: 0 4px 18px rgba(92,184,92,0.35);
    position: absolute;
    left: 50px;
    z-index: 2;
  }

  #yes-btn:hover { background: #4aa84a; transform: none !important; }
  #yes-btn:active { transform: scale(0.97); }

  #no-btn {
    background: #e8a0b4;
    font-size: 18px;
    padding: 16px 36px;
    box-shadow: 0 4px 12px rgba(232,160,180,0.3);
    position: absolute;
    right: 50px;
    z-index: 1;
  }

  #no-btn:hover { background: #d988a0; }

  .final-screen {
    display: none;
    flex-direction: column;
    align-items: center;
  }
  .final-screen.show { display: flex; }

  .final-char {
    width: 200px;
    height: 200px;
    object-fit: contain;
    display: block;
    margin: 0 auto 16px;
  }

  @keyframes happyDance {
    0%   { transform: rotate(-8deg) scale(1); }
    100% { transform: rotate(8deg) scale(1.1); }
  }

  .final-title {
    font-size: 28px;
    font-weight: 900;
    color: #3a7d44;
    margin-bottom: 8px;
  }

  .final-sub {
    font-size: 18px;
    color: #9ab89a;
  }

  .stage { transition: opacity 0.3s ease; }
  .stage.hidden { opacity: 0; pointer-events: none; }

  .confetti-wrap {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  .conf {
    position: absolute;
    animation: confFall 2s ease-in forwards;
  }

  @keyframes confFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(600deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="confetti-wrap" id="confetti"></div>

<div class="card">
  <div class="stage" id="main-stage">
    <img class="char" id="char" src="dudu.gif" alt="">
    <h1 id="heading">Çay içək? 🍵</h1>
    <p class="subtitle" id="subtitle">İstəsən əgər</p>
    <div class="btn-wrap">
      <button class="btn" id="yes-btn" onclick="handleYes()">hə</button>
      <button class="btn" id="no-btn" onclick="handleNo()">yox</button>
    </div>
  </div>

  <div class="final-screen" id="final-stage">
    <img class="final-char" src="quby.gif" alt="">
    <div class="final-title">Fsyo imtahandan sonra içirik</div>
    <div class="final-sub">Çay mənlikdi 🍵</div>
  </div>
</div>

<script>

  const stages = [
    { char: 'dudu.gif',   heading: 'Çay içək? 🍵',            subtitle: 'İstəsən əgər',         yesScale: 1   },
    { char: 'blink.gif',  heading: 'Əminsən?!',                subtitle: 'məncə istəyirsən',      yesScale: 1.5   },
    { char: 'sadcat.gif', heading: 'HƏQİİ?',                   subtitle: 'çaydan zərər gəlməz',   yesScale: 2.5 },
    { char: 'pig.gif',    heading: 'İndi də yox de gör nolur', subtitle: 'məncə həyə basmalısan', yesScale: 4   },
  ];

  let step = 0;

  const charEl     = document.getElementById('char');
  const headingEl  = document.getElementById('heading');
  const subtitleEl = document.getElementById('subtitle');
  const yesBtn     = document.getElementById('yes-btn');
  const noBtn      = document.getElementById('no-btn');

  function applyStage(s) {
    charEl.src             = s.char;
    headingEl.textContent  = s.heading;
    subtitleEl.textContent = s.subtitle;

    yesBtn.style.fontSize = (18 * s.yesScale) + 'px';
    const p = Math.min(s.yesScale, 1.8);
    yesBtn.style.padding = (16 * p) + 'px ' + (36 * p) + 'px';

    if (s.noScale === 0) {
      noBtn.style.transform     = 'scale(0)';
      noBtn.style.opacity       = '0';
      noBtn.style.pointerEvents = 'none';
      noBtn.style.width         = '0';
      noBtn.style.padding       = '0';
    } else {
      noBtn.style.transform     = 'scale(' + s.noScale + ')';
      noBtn.style.opacity       = s.noScale < 0.2 ? '0' : '1';
      noBtn.style.pointerEvents = 'auto';
    }
  }

  function handleNo() {
    if (step < stages.length - 1) {
      step++;
      applyStage(stages[step]);
    }
  }

  function handleYes() {
    document.getElementById('main-stage').classList.add('hidden');
    setTimeout(() => {
      document.getElementById('main-stage').style.display = 'none';
      document.getElementById('final-stage').classList.add('show');
    }, 300);
    launchConfetti();
  }

  function launchConfetti() {
    const colors = ['#5cb85c','#f7c59f','#e8a0b4','#a8d8ea','#fffacd','#b5ead7','#ffd700'];
    const wrap   = document.getElementById('confetti');
    for (let i = 0; i < 90; i++) {
      const el = document.createElement('div');
      el.className = 'conf';
      el.style.left              = Math.random() * 100 + 'vw';
      el.style.top               = '-20px';
      el.style.width             = (6 + Math.random() * 10) + 'px';
      el.style.height            = (6 + Math.random() * 10) + 'px';
      el.style.borderRadius      = Math.random() > 0.5 ? '50%' : '3px';
      el.style.background        = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDelay    = (Math.random() * 1.2) + 's';
      el.style.animationDuration = (1.4 + Math.random() * 0.8) + 's';
      wrap.appendChild(el);
    }
    setTimeout(() => wrap.innerHTML = '', 4000);
  }

  applyStage(stages[0]);
</script>
</body>
</html>
